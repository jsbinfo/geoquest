<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest 100 - Pro Edition</title>
    <style>
        :root { --blue: #1e40af; --sand: #fefce8; --text: #1e293b; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow: hidden; color: var(--text);
        }

        .globe-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 850px; height: 850px; opacity: 0.5; z-index: -1;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/2/22/Earth_Western_Hemisphere_transparent_background.png');
            background-size: contain; background-repeat: no-repeat;
            animation: spinGlobe 80s linear infinite;
        }
        @keyframes spinGlobe { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        .atlas-card { 
            background: var(--sand); border-radius: 20px; padding: 40px; 
            width: 90%; max-width: 550px; box-shadow: 0 0 60px rgba(0,0,0,0.9);
            border: 6px solid #d4d4d8; position: relative;
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
        }

        .header { border-bottom: 3px double var(--blue); margin-bottom: 25px; text-align: center; }
        h1 { margin: 0; font-size: 26px; color: var(--blue); letter-spacing: 2px; text-transform: uppercase; }

        .btn-geo { 
            background: var(--blue); color: white; border: none; padding: 18px; 
            border-radius: 10px; width: 100%; font-size: 16px; font-weight: bold; 
            cursor: pointer; margin-bottom: 12px; transition: 0.2s; border-bottom: 5px solid #172554;
        }
        .btn-geo:hover { background: #0ea5e9; transform: translateY(-3px); }

        .opt-geo { 
            background: white; border: 2px solid #cbd5e1; border-radius: 10px; 
            padding: 16px; margin-bottom: 12px; width: 100%; text-align: left; 
            cursor: pointer; font-weight: 600; font-size: 15px; transition: 0.2s;
            box-shadow: 0 3px 0 #cbd5e1;
        }
        .opt-geo:hover { background: #e0f2fe; transform: translateX(10px); border-color: var(--blue); }

        #unlock-screen { position: absolute; z-index: 100; width: 100%; height: 100%; background: var(--sand); display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 15px; top: 0; left: 0; text-align: center; padding: 20px; }
        
        #start, #game, #result { display: none; }
        .anim-acerto { background: #bcfab0 !important; border-color: #15803d !important; }
        .anim-erro { animation: shake 0.4s; background: #fecaca !important; border-color: #991b1b !important; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <div class="globe-bg"></div>

    <div class="atlas-card">
        <div id="unlock-screen">
            <h1 style="color: var(--blue);">🌎 GeoQuest 100</h1>
            <p>Clique abaixo para carregar o banco de dados geográfico.</p>
            <button class="btn-geo" onclick="desbloquear()">CARREGAR EXPEDIÇÃO</button>
        </div>

        <div id="start">
            <div class="header"><h1>Selecione o Nível</h1></div>
            <button class="btn-geo" onmouseenter="playFlick()" onclick="jogar(20)">📍 20 QUESTÕES</button>
            <button class="btn-geo" onmouseenter="playFlick()" onclick="jogar(30)">🚢 30 QUESTÕES</button>
            <button class="btn-geo" onmouseenter="playFlick()" onclick="jogar(50)">🔭 50 QUESTÕES</button>
        </div>

        <div id="game">
            <div id="progress" style="font-size: 12px; font-weight: bold; color: var(--blue); margin-bottom: 10px; text-transform: uppercase;"></div>
            <div id="q-txt" style="font-size: 18px; font-weight: 800; margin-bottom: 25px; color: #000;"></div>
            <div id="opts"></div>
        </div>

        <div id="result">
            <h1 id="res-rank">RESULTADO FINAL</h1>
            <p id="res-score" style="font-size: 20px; font-weight: bold; margin: 20px 0;"></p>
            <button class="btn-geo" onclick="location.reload()">REINICIAR BANCO</button>
        </div>
    </div>

<script>
    const audioAcerto = new Audio('https://www.myinstants.com/media/sounds/claps.mp3');
    const audioErro = new Audio('https://www.myinstants.com/media/sounds/auditorium-applause-disappointed.mp3');
    let audioCtx;
    
    function desbloquear() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('unlock-screen').style.display = 'none';
        document.getElementById('start').style.display = 'block';
    }

    function playFlick() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        const src = audioCtx.createBufferSource();
        src.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'highpass'; filter.frequency.setValueAtTime(3200, now);
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.04, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
        src.connect(filter); filter.connect(g); g.connect(audioCtx.destination);
        src.start();
    }

    // BANCO DE DADOS AMPLIADO (PARA EVITAR REPETIÇÕES)
    const bancoQuestoes = [
        { q: "Qual é o maior bioma brasileiro em extensão?", o: ["Cerrado", "Mata Atlântica", "Amazônia"], a: 2 },
        { q: "O que define o conceito de 'Território Ancestral'?", o: ["Áreas para agronegócio", "Espaço de herança histórica e cultural", "Zonas de livre comércio"], a: 1 },
        { q: "Por que as casas ribeirinhas são palafitas?", o: ["Estilo arquitetônico", "Adaptação às cheias dos rios", "Proteção contra terremotos"], a: 1 },
        { q: "O Rio São Francisco é conhecido popularmente como:", o: ["Velho Chico", "Gigante do Sul", "Rio das Pedras"], a: 0 },
        { q: "O Pantanal é considerado a maior planície ____ do mundo.", o: ["Árida", "Alagável", "Montanhosa"], a: 1 },
        { q: "Qual destes estados não pertence à Região Norte?", o: ["Tocantins", "Maranhão", "Acre"], a: 1 },
        { q: "O Quilombo representa historicamente:", o: ["Resistência e liberdade", "Uma feira de trocas", "Um posto militar"], a: 0 },
        { q: "Qual a principal atividade econômica da Zona Franca de Manaus?", o: ["Agricultura", "Indústria eletroeletrônica", "Pecuária"], a: 1 },
        { q: "O ponto mais alto do relevo brasileiro é o:", o: ["Pico da Bandeira", "Pico do Cristal", "Pico da Neblina"], a: 2 },
        { q: "A 'Voadeira' é um transporte essencial para:", o: ["Comunidades ribeirinhas", "Trabalhadores de metrô", "Moradores de favelas"], a: 0 },
        { q: "Qual bioma brasileiro é conhecido como 'Savana brasileira'?", o: ["Caatinga", "Cerrado", "Pampa"], a: 1 },
        { q: "O fenômeno do 'Encontro das Águas' ocorre em qual estado?", o: ["Pará", "Amazonas", "Amapá"], a: 1 },
        { q: "Qual destas é uma característica da Caatinga?", o: ["Vegetação xerófila (resistente à seca)", "Florestas densas e úmidas", "Solo sempre encharcado"], a: 0 },
        { q: "O que são as 'Terras Indígenas' segundo a Constituição?", o: ["Terras para venda", "Bens da União de usufruto exclusivo dos indígenas", "Áreas para mineração livre"], a: 1 },
        { q: "O Brasil faz fronteira com quase todos os países da América do Sul, exceto:", o: ["Chile e Equador", "Argentina e Uruguai", "Peru e Bolívia"], a: 0 }
        // Adicione mais questões seguindo este padrão para chegar a 100
    ];

    let quiz = [], cur = 0, score = 0, busy = false;

    function jogar(n) {
        document.getElementById('start').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        // Embaralha e corta o número exato de questões
        quiz = bancoQuestoes.sort(() => Math.random() - 0.5).slice(0, n);
        render();
    }

    function render() {
        busy = false;
        const q = quiz[cur];
        document.getElementById('progress').innerText = `Questão ${cur+1} de ${quiz.length}`;
        document.getElementById('q-txt').innerText = q.q;
        const box = document.getElementById('opts'); box.innerHTML = '';
        
        q.o.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'opt-geo'; b.innerText = txt;
            b.onmouseenter = () => playFlick();
            b.onclick = () => {
                if(busy) return; busy = true;
                if(i === q.a) { audioAcerto.play(); b.classList.add('anim-acerto'); score++; }
                else { audioErro.play(); b.classList.add('anim-erro'); }
                setTimeout(() => { 
                    cur++; 
                    if(cur < quiz.length) render(); 
                    else finalizar(); 
                }, 1400);
            };
            box.appendChild(b);
        });
    }

    function finalizar() {
        document.getElementById('game').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('res-score').innerText = `Você acertou ${score} de ${quiz.length} questões!`;
    }
</script>
</body>
</html>
