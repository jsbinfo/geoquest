<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest - Card Audio Edition</title>
    <style>
        :root { --primary: #6366f1; --secondary: #0ea5e9; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }

        .card { 
            background: white; border-radius: 25px; padding: 40px; width: 90%; max-width: 420px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; border: 10px solid #fff;
            position: relative; z-index: 10; transition: 0.3s;
        }

        .btn { 
            color: white; border: none; padding: 20px; border-radius: 15px; width: 100%; 
            font-size: 18px; font-weight: 800; cursor: pointer; margin-bottom: 15px; 
            transition: 0.2s; box-shadow: 0 6px 0 #333; display: block; 
        }
        .btn:hover { transform: translateY(-5px); filter: brightness(1.1); }

        .opt { 
            background: #fff; border: 2px solid #e2e8f0; border-radius: 15px; padding: 18px; 
            margin-bottom: 12px; width: 100%; text-align: left; cursor: pointer; 
            font-weight: 700; font-size: 16px; color: #475569; transition: 0.2s; 
            box-shadow: 0 4px 0 #f1f5f9; display: block; 
        }
        .opt:hover { transform: translateY(-5px) rotate(-1deg); border-color: var(--secondary); background: #f8fafc; }

        #game, #result { display: none; }
        .anim-acerto { background: #dcfce7 !important; border-color: var(--success) !important; }
        .anim-erro { animation: shake 0.4s; background: #fee2e2 !important; border-color: var(--danger) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

<div class="card" id="box">
    <div id="start">
        <div style="font-size: 50px; margin-bottom: 10px;">🃏</div>
        <h1 style="color: #1e293b;">GeoQuest</h1>
        <p style="color: #64748b; margin-bottom: 25px;">Escolha o tamanho do deck:</p>
        <button class="btn" style="background:var(--secondary);" onmouseenter="playCardFlick()" onclick="jogar(20)">🚀 20 CARTAS</button>
        <button class="btn" style="background:var(--primary);" onmouseenter="playCardFlick()" onclick="jogar(30)">🚁 30 CARTAS</button>
        <button class="btn" style="background:#8b5cf6;" onmouseenter="playCardFlick()" onclick="jogar(50)">👑 50 CARTAS</button>
    </div>

    <div id="game">
        <div id="q-txt" style="font-size: 18px; font-weight: 800; text-align: left; margin-bottom: 20px;"></div>
        <div id="opts"></div>
    </div>

    <div id="result">
        <h1 id="res-rank"></h1>
        <p id="res-score" style="font-size: 18px; font-weight: 700;"></p>
        <button class="btn" style="background:var(--secondary);" onmouseenter="playCardFlick()" onclick="location.reload()">NOVO DECK</button>
    </div>
</div>

<script>
    let audioCtx;
    
    // Inicia o áudio no primeiro clique do usuário (exigência do navegador)
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // SOM DE CARTA (FLICK) - Gerado sinteticamente
    function playCardFlick() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        
        // Criar ruído branco curto para simular o atrito do papel/plástico
        const bufferSize = audioCtx.sampleRate * 0.05; 
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;

        // Filtro passa-alta para deixar o som "seco" como papel
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.setValueAtTime(3200, now);

        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.08, now); // Volume baixo para ser elegante
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        noise.start(now);
    }

    function playShuffle() {
        for(let i=0; i<10; i++) {
            setTimeout(() => playCardFlick(), i * 40);
        }
    }

    const bancoBase = [
        { q: "O que é um 'Território Ancestral'?", o: ["Terra para lucro", "Espaço de herança histórica e cultural", "Loteamento novo"], a: 1 },
        { q: "Casas ribeirinhas são palafitas para?", o: ["Decoração", "Proteção contra cheias dos rios", "Gastar menos madeira"], a: 1 },
        { q: "A Aldeia Ipavu (Xingu) é do povo?", o: ["Kamayurá", "Bororo", "Tupinambá"], a: 0 },
        { q: "Quilombo simboliza o quê?", o: ["Comércio", "Resistência e liberdade", "Prisão"], a: 1 },
        { q: "Como ribeirinhos viajam no rio?", o: ["Caminhão", "Canoa ou Voadeira", "Jet-ski"], a: 1 }
    ];

    let quiz = [], cur = 0, score = 0, busy = false;

    function jogar(n) {
        initAudio();
        playShuffle(); // Som de embaralhar ao iniciar
        document.getElementById('start').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        
        // Simular banco de 100
        let banco100 = [];
        while(banco100.length < 100) { bancoBase.forEach(i => { if(banco100.length < 100) banco100.push({...i}); }); }
        
        quiz = banco100.sort(() => Math.random() - 0.5).slice(0, n);
        render();
    }

    function render() {
        busy = false;
        const q = quiz[cur];
        document.getElementById('q-txt').innerText = `CARTA ${cur+1}: ${q.q}`;
        const box = document.getElementById('opts');
        box.innerHTML = '';

        q.o.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'opt';
            b.innerText = txt;
            
            // Som de carta ao passar o mouse nas respostas
            b.onmouseenter = () => playCardFlick();

            b.onclick = () => {
                if(busy) return;
                busy = true;
                // No clique também faz um som de carta sendo "jogada"
                playCardFlick(); 
                
                if(i === q.a) {
                    b.classList.add('anim-acerto');
                    score++;
                } else {
                    b.classList.add('anim-erro');
                }

                setTimeout(() => {
                    cur++;
                    if(cur < quiz.length) render();
                    else finalizar();
                }, 600);
            };
            box.appendChild(b);
        });
    }

    function finalizar() {
        document.getElementById('game').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('res-rank').innerText = score >= (quiz.length*0.8) ? "👑 ÁS DAS CARTAS!" : "🥉 BOM JOGO!";
        document.getElementById('res-score').innerText = `Você acertou ${score} de ${quiz.length}`;
    }

    // Garantir que o áudio ative no primeiro clique em qualquer lugar
    document.addEventListener('click', initAudio, { once: true });
</script>
</body>
</html>
