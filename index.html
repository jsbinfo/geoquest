<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest 100 - Esthela</title>
    <style>
        :root { --primary: #6366f1; --secondary: #0ea5e9; --success: #22c55e; --danger: #ef4444; --gold: #fbbf24; }
        
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }

        /* Card Principal com Efeito de Profundidade */
        .card { background: white; border-radius: 40px; padding: 40px; width: 100%; max-width: 450px; box-shadow: 0 0 50px rgba(99, 102, 241, 0.4); text-align: center; border: 8px solid #e2e8f0; animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); }

        @keyframes bounceIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        h1 { color: #1e293b; font-size: 32px; font-weight: 900; text-transform: uppercase; margin: 10px 0; letter-spacing: -1px; }

        /* Botões de Nível Gamificados */
        .btn-lvl { color: white; border: none; padding: 20px; border-radius: 25px; width: 100%; font-size: 18px; font-weight: 800; cursor: pointer; margin-bottom: 20px; transition: 0.2s; box-shadow: 0 8px 0 #333; position: relative; }
        .btn-lvl:hover { transform: scale(1.03); filter: brightness(1.1); }
        .btn-lvl:active { transform: translateY(6px); box-shadow: 0 2px 0 #333; }

        /* Barra de Experiência (XP) Animada */
        .xp-container { background: #f1f5f9; height: 22px; border-radius: 15px; margin-bottom: 30px; border: 3px solid #e2e8f0; overflow: hidden; position: relative; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, #0ea5e9, #22c55e); width: 0%; transition: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .xp-fill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); animation: shine 2s infinite; }

        @keyframes shine { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

        /* Alternativas com Feedback */
        .opt { background: #fff; border: 3px solid #f1f5f9; border-radius: 20px; padding: 18px; margin-bottom: 12px; width: 100%; text-align: left; cursor: pointer; font-weight: 700; font-size: 17px; color: #475569; transition: 0.2s; box-shadow: 0 5px 0 #f1f5f9; }
        .opt:hover { border-color: var(--secondary); background: #f0f9ff; transform: translateX(8px); }

        /* Classes de Acerto e Erro */
        .acerto { animation: pulseGreen 0.5s; background: #dcfce7 !important; border-color: #22c55e !important; box-shadow: 0 5px 0 #16a34a !important; color: #15803d !important; }
        .erro { animation: shake 0.4s; background: #fee2e2 !important; border-color: #ef4444 !important; box-shadow: 0 5px 0 #b91c1c !important; color: #b91c1c !important; }

        @keyframes pulseGreen { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        #game, #result { display: none; }
    </style>
</head>
<body>

<div class="card" id="start">
    <div style="font-size: 80px;">🎮</div>
    <h1>GeoQuest 100</h1>
    <p style="color:#64748b; font-weight: 700; margin-bottom: 30px;">ESTHELA, ESCOLHA SEU NÍVEL:</p>
    <button class="btn-lvl" style="background:var(--secondary); box-shadow: 0 8px 0 #0284c7;" onclick="jogar(20)">🚀 FÁCIL (20 Qs)</button>
    <button class="btn-lvl" style="background:var(--primary); box-shadow: 0 8px 0 #4338ca;" onclick="jogar(30)">🚁 MÉDIO (30 Qs)</button>
    <button class="btn-lvl" style="background:#8b5cf6; box-shadow: 0 8px 0 #6d28d9;" onclick="jogar(50)">👑 MESTRE (50 Qs)</button>
</div>

<div class="card" id="game">
    <div class="xp-container"><div id="pb" class="xp-fill"></div></div>
    <div id="q-txt" style="font-size: 22px; font-weight: 800; color:#1e293b; text-align: left; margin-bottom: 25px; line-height: 1.3;"></div>
    <div id="opts"></div>
</div>

<div class="card" id="result">
    <div id="medal" style="font-size: 110px; margin-bottom: 10px;"></div>
    <h1 id="rank-name"></h1>
    <p id="res-score" style="font-size: 24px; font-weight: 800; color: #475569;"></p>
    <button class="btn-lvl" style="background:var(--secondary); box-shadow: 0 8px 0 #0284c7; margin-top: 25px;" onclick="location.reload()">JOGAR NOVAMENTE</button>
</div>

<script>
    const URL_LOG = "https://script.google.com/macros/s/AKfycbwCtokjD5Uw6weMAjlp2iQhsXpfi9lpCTvvAp8yTRan35-SskKIrxGfh1So617-8FEq/exec";

    const bancoQuestoes = [
        { q: "Por que as casas ribeirinhas são palafitas?", o: ["Pela beleza", "Evitar enchentes", "Fugir do calor"], a: 1 },
        { q: "Onde fica a aldeia Ipavu?", o: ["No Rio de Janeiro", "No Xingu (MT)", "Amazonas"], a: 1 },
        { q: "Qual material das ocas tradicionais?", o: ["Pedra", "Barro e Palha", "Plástico"], a: 1 },
        { q: "O que é um Quilombo?", o: ["Feira", "Lugar de resistência", "Fábrica"], a: 1 },
        { q: "Transporte comum no rio?", o: ["Trem", "Barco e canoa", "Carro"], a: 1 },
        { q: "Como os mais velhos ensinam nos quilombos?", o: ["Por e-mail", "Contando histórias", "Pelo rádio"], a: 1 },
        { q: "O que os indígenas protegem?", o: ["Prédios", "A natureza e floresta", "Carros"], a: 1 },
        { q: "A escola na floresta ensina sobre...", o: ["Só cidades", "Plantas e animais", "Planetas"], a: 1 },
        { q: "Ribeirinhos vivem perto de onde?", o: ["Dos Rios", "Dos Desertos", "Das Montanhas"], a: 0 },
        { q: "O que é tradição oral?", o: ["Cuidar dos dentes", "Passar cultura falando", "Ler apenas livros"], a: 1 }
    ];

    let quiz = [], etapa = 0, score = 0, travado = false;

    function jogar(n) {
        // Envia log para sua planilha
        new Image().src = URL_LOG + "?ip=Esthela_Nivel_" + n + "_" + Date.now();
        
        document.getElementById('start').style.display = 'none';
        document.getElementById('game').style.display = 'block';

        // Gera 100 variações aleatórias a partir da base
        let pool = [];
        while(pool.length < 100) { bancoQuestoes.forEach(x => pool.push({...x})); }
        quiz = pool.sort(() => Math.random() - 0.5).slice(0, n);
        mostrar();
    }

    function mostrar() {
        travado = false;
        const q = quiz[etapa];
        document.getElementById('pb').style.width = (etapa/quiz.length*100) + "%";
        document.getElementById('q-txt').innerText = `Questão ${etapa+1}: ${q.q}`;
        
        const box = document.getElementById('opts');
        box.innerHTML = '';

        q.o.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'opt';
            b.innerText = txt;
            b.onclick = () => {
                if(travado) return;
                travado = true;
                if(i === q.a) {
                    b.classList.add('acerto');
                    score++;
                } else {
                    b.classList.add('erro');
                }
                setTimeout(() => {
                    etapa++;
                    if(etapa < quiz.length) mostrar();
                    else finalizar();
                }, 750);
            };
            box.appendChild(b);
        });
    }

    function finalizar() {
        document.getElementById('game').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        
        let pct = (score / quiz.length) * 100;
        let medalha = "🥉"; let rank = "BRONZE";
        if(pct >= 90) { medalha = "🥇"; rank = "OURO"; }
        else if(pct >= 60) { medalha = "🥈"; rank = "PRATA"; }

        document.getElementById('medal').innerText = medalha;
        document.getElementById('rank-name').innerText = "NÍVEL " + rank;
        document.getElementById('res-score').innerText = `Você acertou ${score} de ${quiz.length}!`;
    }
</script>
</body>
</html>
