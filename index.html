<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest: Missão Esthela</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #0ea5e9;
            --success: #22c55e;
            --bg-light: #f0f9ff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            background-image: linear-gradient(180deg, #e0f2fe 0%, #f0f9ff 100%);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 15px;
        }

        .game-card {
            background: white; border-radius: 30px; padding: 30px;
            width: 100%; max-width: 550px;
            box-shadow: 0 15px 35px rgba(14, 165, 233, 0.2);
            border: 4px solid white; text-align: center;
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .progress-outer {
            width: 100%; background: #e2e8f0; height: 16px; border-radius: 20px;
            margin-bottom: 25px; overflow: hidden;
        }
        .progress-inner {
            height: 100%; background: linear-gradient(90deg, #0ea5e9, #22c55e);
            width: 0%; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .question-text {
            font-size: 20px; font-weight: 700; color: #334155;
            margin-bottom: 25px; line-height: 1.4; text-align: left;
            padding: 20px; border-radius: 20px; background: #f8fafc;
            border-left: 6px solid var(--secondary);
        }

        .btn-option {
            background: white; border: 2px solid #e2e8f0; border-radius: 20px;
            padding: 18px; margin-bottom: 15px; cursor: pointer; text-align: left;
            transition: all 0.2s ease; font-size: 17px; font-weight: 600; color: #475569;
            box-shadow: 0 5px 0 #e2e8f0; width: 100%; display: block; outline: none;
        }
        
        .btn-option:hover:not(:disabled) { 
            border-color: var(--secondary); 
            background: #f0f9ff; 
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #bae6fd;
        }

        .btn-correct { background: #dcfce7 !important; border-color: #22c55e !important; box-shadow: 0 5px 0 #16a34a !important; }
        .btn-wrong { background: #fee2e2 !important; border-color: #ef4444 !important; box-shadow: 0 5px 0 #dc2626 !important; }

        .feedback-area {
            background: #fffbeb; border-radius: 25px; padding: 20px; margin-top: 20px;
            border: 2px solid #fde68a; display: none;
        }

        .btn-next {
            background: var(--success); color: white; border: none; padding: 18px;
            border-radius: 50px; font-weight: 800; cursor: pointer; width: 100%;
            margin-top: 15px; font-size: 18px; box-shadow: 0 6px 0 #16a34a;
        }

        .btn-start {
            background: var(--secondary); color: white; border: none; padding: 22px;
            margin: 12px 0; border-radius: 25px; width: 100%; font-size: 19px;
            font-weight: 800; cursor: pointer; box-shadow: 0 6px 0 #0284c7;
        }

        #game-screen, #result-screen { display: none; }
    </style>
</head>
<body>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

<div class="game-card" id="start-screen">
    <div style="font-size: 80px; margin-bottom: 15px;">🌍</div>
    <h1>GeoQuest 100</h1>
    <p style="color: #64748b; font-weight: 600; margin-bottom: 35px;">Pronta para o desafio, Esthela?</p>
    <button class="btn-start" onclick="initGame(20)">🚀 NÍVEL 1 (20 Questões)</button>
    <button class="btn-start" onclick="initGame(50)" style="background-color: var(--primary); box-shadow: 0 6px 0 #3730a3;">🚁 NÍVEL 2 (50 Questões)</button>
    <button class="btn-start" onclick="initGame(100)" style="background-color: #8b5cf6; box-shadow: 0 6px 0 #6d28d9;">👑 DESAFIO 100</button>
</div>

<div class="game-card" id="game-screen">
    <div class="progress-outer"><div id="progress-bar" class="progress-inner"></div></div>
    <div id="q-status" style="font-size: 14px; color: var(--secondary); font-weight: 800; margin-bottom: 12px; text-align: left;"></div>
    <div class="question-text" id="q-body"></div>
    <div id="options-list"></div>
    <div id="feedback-panel" class="feedback-area">
        <div id="status-label" style="font-weight: 900; font-size: 22px; margin-bottom: 10px;"></div>
        <p id="explanation-text" style="color: #92400e; font-weight: 500;"></p>
        <button class="btn-next" onclick="nextQ()">PRÓXIMA FASE ➔</button>
    </div>
</div>

<div class="game-card" id="result-screen">
    <div id="res-icon" style="font-size: 100px; margin-bottom: 15px;"></div>
    <h1 id="res-msg"></h1>
    <p id="res-score" style="font-size: 22px; color: #64748b; margin-bottom: 35px;"></p>
    <button class="btn-start" onclick="location.reload()">JOGAR DE NOVO</button>
</div>

<script>
    // --- SISTEMA DE LOG DE IP (Bypass de CORS) ---
    async function registrarAcesso() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScizAaPG6PTqwTvKJI81G8iEz_W7Xa30F29FbyHt-zh8gKVUg/formResponse";
            const ENTRY_ID = "entry.2060133202"; 

            const form = document.createElement('form');
            form.action = FORM_URL; form.method = 'POST'; form.target = 'hidden_iframe';
            const input = document.createElement('input');
            input.name = ENTRY_ID; input.value = data.ip;
            form.appendChild(input); document.body.appendChild(form);
            form.submit();
        } catch (e) {}
    }

    // --- BANCO DE DADOS (10 TEMAS X 10 VARIAÇÕES = 100 QUESTÕES) ---
    const baseBank = [
        { q: "Por que as casas palafitas ficam sobre estacas?", o: ["Estilo", "Evitar enchentes", "Fugir do calor"], a: 1, e: "As estacas mantêm a casa acima do nível do rio nas cheias." },
        { q: "Onde fica a aldeia Ipavu?", o: ["Amazonas", "Parque do Xingu (MT)", "Pantanal"], a: 1, e: "A aldeia Ipavu é um centro cultural importante no Mato Grosso." },
        { q: "Do que são feitas as ocas?", o: ["Cimento", "Barro e palha", "Plástico"], a: 1, e: "Materiais naturais garantem que a oca seja fresca." },
        { q: "O que caracteriza os Quilombos?", o: ["Shopping", "Refúgio e Resistência", "Fábrica"], a: 1, e: "Espaços de liberdade criados por negros escravizados." },
        { q: "Como os ribeirinhos vão para a escola?", o: ["Carro", "Barcos", "Metrô"], a: 1, e: "O rio é a estrada principal dessas comunidades." },
        { q: "O que as mulheres de Malhadinha guardam?", o: ["Ouro", "Sementes e tradições", "Roupas velhas"], a: 1, e: "Elas protegem a biodiversidade das plantações." },
        { q: "O que é oralidade?", o: ["Escrever muito", "Passar saber falando", "Ficar em silêncio"], a: 1, e: "É o ensinamento passado pelos anciãos através de histórias." },
        { q: "A agricultura quilombola foca em quê?", o: ["Só um produto", "Policultura (vários alimentos)", "Produtos químicos"], a: 1, e: "Plantar de tudo mantém a terra saudável e a mesa cheia." },
        { q: "Qual o papel do ancião na aldeia?", o: ["Trabalhar na fábrica", "Guardar a sabedoria", "Viajar"], a: 1, e: "Eles são os professores das tradições ancestrais." },
        { q: "Por que cuidar da natureza como os indígenas?", o: ["Para ganhar dinheiro", "Para garantir o futuro do planeta", "Por obrigação"], a: 1, e: "Eles usam a floresta sem destruí-la." }
    ];

    // Gerador de 100 questões (Expande e embaralha a base)
    let questions100 = [];
    while(questions100.length < 100) {
        baseBank.forEach(item => { if(questions100.length < 100) questions100.push({...item}); });
    }

    let gameBank = [], curIdx = 0, corrects = 0, isLocked = false;

    function initGame(n) {
        registrarAcesso();
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        gameBank = questions100.sort(() => Math.random() - 0.5).slice(0, n);
        curIdx = 0; corrects = 0; showQ();
    }

    function showQ() {
        isLocked = false;
        const q = gameBank[curIdx];
        document.getElementById('progress-bar').style.width = (curIdx / gameBank.length * 100) + "%";
        document.getElementById('q-status').innerText = `QUESTÃO ${curIdx + 1} DE ${gameBank.length}`;
        document.getElementById('q-body').innerText = q.q;
        document.getElementById('feedback-panel').style.display = 'none';
        const list = document.getElementById('options-list');
        list.innerHTML = '';
        q.o.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'btn-option';
            b.innerText = txt;
            b.onclick = () => checkQ(i === q.a, b);
            list.appendChild(b);
        });
    }

    function checkQ(isOk, btn) {
        if(isLocked) return;
        isLocked = true;
        const label = document.getElementById('status-label');
        if(isOk) {
            btn.classList.add('btn-correct');
            label.innerText = "⭐ ACERTOU!";
            label.style.color = "#16a34a";
            corrects++;
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        } else {
            btn.classList.add('btn-wrong');
            label.innerText = "💡 EXPLICAÇÃO:";
            label.style.color = "#dc2626";
        }
        document.getElementById('explanation-text').innerText = gameBank[curIdx].e;
        document.getElementById('feedback-panel').style.display = 'block';
    }

    function nextQ() {
        curIdx++;
        if(curIdx < gameBank.length) showQ(); else end();
    }

    function end() {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        const p = (corrects / gameBank.length) * 100;
        document.getElementById('res-msg').innerText = p >= 70 ? "PARABÉNS, ESTHELA!" : "BOM TRABALHO!";
        document.getElementById('res-icon').innerText = p >= 70 ? "🏆" : "📚";
        document.getElementById('res-score').innerText = `Você acertou ${corrects} de ${gameBank.length}!`;
    }
</script>
</body>

<script>

        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            const FORM_ID = "1FAIpQLScizAaPG6PTqwTvKJI81G8iEz_W7Xa30F29FbyHt-zh8gKVUg";
