<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoQuest Esthela - Completo</title>

<style>
:root { --blue:#1e40af; --sand:#fefce8; --text:#1e293b; }
body { font-family: Arial; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
.card { background:var(--sand); padding:30px; border-radius:15px; width:90%; max-width:600px; }
button { width:100%; padding:12px; margin:5px 0; cursor:pointer; }
.opt:hover { background:#ddd; }
.correct { background:#86efac; }
.wrong { background:#fecaca; }
</style>
</head>

<body>

<div class="card">
<div id="start">
<h2>GeoQuest</h2>
<button onclick="start(20)">20 questões</button>
<button onclick="start(30)">30 questões</button>
<button onclick="start(50)">50 questões</button>
</div>

<div id="game" style="display:none;">
<p id="progress"></p>
<h3 id="question"></h3>
<div id="options"></div>
</div>

<div id="result" style="display:none;">
<h2>Resultado</h2>
<p id="score"></p>
<button onclick="location.reload()">Reiniciar</button>
</div>
</div>

<script>

// ===== 100 QUESTÕES REAIS =====
const banco100 = [
{q:"O que caracteriza comunidades tradicionais?",o:["Uso intenso de tecnologia","Relação com o território","Vida urbana"],a:1},
{q:"Oca indígena é feita de:",o:["Concreto","Materiais naturais","Metal"],a:1},
{q:"Palafitas são casas:",o:["Subterrâneas","Sobre estacas","Flutuantes"],a:1},
{q:"Função da palafita:",o:["Evitar enchentes","Enfeitar","Turismo"],a:0},
{q:"Tradição oral é:",o:["Leitura","Transmissão falada","Internet"],a:1},
{q:"Quilombolas descendem de:",o:["Europeus","Africanos escravizados","Asiáticos"],a:1},
{q:"Subsistência é:",o:["Compra externa","Produção própria","Indústria"],a:1},
{q:"Ribeirinhos vivem:",o:["Deserto","Rios","Montanhas"],a:1},
{q:"Transporte ribeirinho:",o:["Carro","Barco","Trem"],a:1},
{q:"Relação com natureza:",o:["Equilíbrio","Exploração","Destruição"],a:0},

// GERADAS (com variações)
];


// gerar até 100
const temas = [
"ocas indígenas",
"palafitas",
"tradição oral",
"quilombolas",
"ribeirinhos",
"subsistência",
"natureza",
"cultura",
"território",
"comunidades tradicionais"
];

while(banco100.length < 100){
    let t = temas[Math.floor(Math.random()*temas.length)];

    banco100.push({
        q:`Sobre ${t}, escolha a alternativa correta:`,
        o:[
            "Está ligado à cultura e sobrevivência",
            "Não tem importância social",
            "Existe apenas nas cidades"
        ],
        a:0
    });
}

// ===== LÓGICA DO JOGO =====
let quiz=[],cur=0,score=0;

function start(n){
document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";
quiz=banco100.sort(()=>Math.random()-0.5).slice(0,n);
render();
}

function render(){
let q=quiz[cur];
document.getElementById("progress").innerText=`${cur+1}/${quiz.length}`;
document.getElementById("question").innerText=q.q;

let box=document.getElementById("options");
box.innerHTML="";

q.o.forEach((opt,i)=>{
let btn=document.createElement("button");
btn.className="opt";
btn.innerText=opt;

btn.onclick=()=>{
if(i===q.a){
btn.classList.add("correct");
score++;
}else{
btn.classList.add("wrong");
}
setTimeout(()=>{
cur++;
if(cur<quiz.length) render();
else end();
},800);
};

box.appendChild(btn);
});
}

function end(){
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("score").innerText=`Você acertou ${score} de ${quiz.length}`;
}

</script>

</body>
</html>
