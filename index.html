<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest 100</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e0f2fe; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; border-radius: 25px; padding: 25px; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; border: 3px solid #fff; }
        .btn-main { background: #0ea5e9; color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #0284c7; margin-bottom: 12px; }
        .btn-opt { background: #ffffff; border: 2px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 10px; width: 100%; text-align: left; cursor: pointer; font-size: 16px; font-weight: 600; color: #334155; display: block; }
        .progress { background: #f1f5f9; height: 12px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        #pb { height: 100%; background: #22c55e; width: 0%; border-radius: 10px; transition: 0.4s; }
        #game, #result { display: none; }
        .q-info { color: #0ea5e9; font-weight: 800; font-size: 12px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="card" id="start">
    <h1 style="font-size: 24px;">🌍 GeoQuest 100</h1>
    <p style="color: #64748b;">Pronta, Esthela?</p>
    <button class="btn-main" onclick="init(20)">🚀 COMEÇAR (20 Qs)</button>
    <button class="btn-main" onclick="init(100)" style="background:#8b5cf6; box-shadow:0 5px 0 #6d28d9;">👑 DESAFIO 100</button>
</div>

<div class="card" id="game">
    <div class="progress"><div id="pb"></div></div>
    <span class="q-info" id="q-idx"></span>
    <div id="q-txt" style="font-size: 19px; font-weight: 700; margin-bottom: 20px; text-align: left;"></div>
    <div id="opts"></div>
</div>

<div class="card" id="result">
    <h1>🏆 FIM!</h1>
    <p id="res-txt" style="font-size: 18px;"></p>
    <button class="btn-main" onclick="location.reload()">RECOMEÇAR</button>
</div>

<script>
    // URL do seu Google Script para log de IP
    const URL_APPS = "https://script.google.com/macros/s/AKfycbwCtokjD5Uw6weMAjlp2iQhsXpfi9lpCTvvAp8yTRan35-SskKIrxGfh1So617-8FEq/exec";

    const base = [
        { q: "Onde fica a aldeia Ipavu?", o: ["No Rio de Janeiro", "No Parque do Xingu (MT)", "Em São Paulo"], a: 1 },
        { q: "Por que as casas ribeirinhas são palafitas?", o: ["Pela beleza", "Para evitar inundações", "Para ventilar"], a: 1 },
        { q: "O que caracteriza os Quilombos?", o: ["Vilas de comércio", "Refúgio e resistência", "Cidades industriais"], a: 1 },
        { q: "Principal transporte ribeirinho?", o: ["Ônibus", "Barcos e canoas", "Bicicletas"], a: 1 },
        { q: "Material das ocas tradicionais?", o: ["Tijolo", "Barro e fibras vegetais", "Metal"], a: 1 }
    ];

    let bank = [], cur = 0, score = 0;

    function init(n) {
        // Log de IP simplificado via Imagem (Bypass CSP)
        new Image().src = URL_APPS + "?ip=Acesso_Esthela&t=" + Date.now();

        document.getElementById('start').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        
        let temp = [];
        while(temp.length < 100) { base.forEach(x => temp.push({...x})); }
        bank = temp.sort(() => 0.5 - Math.random()).slice(0, n);
        render();
    }

    function render() {
        const q = bank[cur];
        document.getElementById('pb').style.width = (cur / bank.length * 100) + "%";
        document.getElementById('q-idx').innerText = "QUESTÃO " + (cur + 1) + " DE " + bank.length;
        document.getElementById('q-txt').innerText = q.q;
        
        const div = document.getElementById('opts');
        div.innerHTML = "";
        
        q.o.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = "btn-opt";
            b.innerText = txt;
            b.onclick = function() {
                if(i === q.a) {
                    this.style.background = "#dcfce7";
                    this.style.borderColor = "#22c55e";
                    score++;
                } else {
                    this.style.background = "#fee2e2";
                    this.style.borderColor = "#ef4444";
                }
                // Trava os botões para não clicar duas vezes
                const btns = div.getElementsByTagName('button');
                for(let btn of btns) btn.disabled = true;

                setTimeout(() => {
                    cur++;
                    if(cur < bank.length) render();
                    else finish();
                }, 700);
            };
            div.appendChild(b);
        });
    }

    function finish() {
        document.getElementById('game').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('res-txt').innerText = "Esthela, você acertou " + score + " de " + bank.length + "!";
    }
</script>
</body>
</html>
