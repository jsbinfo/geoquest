<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>GeoQuest</title>

<style>
body{font-family:Arial;background:#111;color:#000;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}
.box{background:#fefce8;padding:20px;border-radius:10px;width:90%;max-width:420px;}
button{width:100%;padding:10px;margin:5px 0;}
.correct{background:#86efac;}
.wrong{background:#fecaca;}
</style>
</head>

<body>

<div class="box">

<div id="start">
<h3>GeoQuest</h3>
<button onclick="start(20)">20</button>
<button onclick="start(30)">30</button>
<button onclick="start(50)">50</button>
</div>

<div id="game" style="display:none;">
<p id="p"></p>
<h4 id="q"></h4>
<div id="o"></div>
<p id="exp"></p>
</div>

<div id="end" style="display:none;">
<h3 id="res"></h3>
<button onclick="location.reload()">Reiniciar</button>
</div>

</div>

<script>

// ===== BANCO REAL (SEM LOOP) =====
const banco = [
{q:"O que são palafitas?",o:["Casas sobre estacas","Casas subterrâneas","Casas de concreto"],a:0,exp:"Protegem contra enchentes."},
{q:"O que é tradição oral?",o:["Transmissão pela fala","Uso de livros","Internet"],a:0,exp:"Conhecimento passado verbalmente."},
{q:"Quem são quilombolas?",o:["Descendentes de africanos escravizados","Europeus","Asiáticos"],a:0,exp:"Representam resistência."},
{q:"Onde vivem ribeirinhos?",o:["Às margens dos rios","Desertos","Montanhas"],a:0,exp:"Dependem dos rios."},
{q:"Oca indígena é feita de?",o:["Materiais naturais","Metal","Concreto"],a:0,exp:"Usa recursos naturais."},
{q:"Qual transporte ribeirinho?",o:["Barco","Carro","Trem"],a:0,exp:"Rios são vias principais."},
{q:"O que é subsistência?",o:["Produção própria","Importação","Exportação"],a:0,exp:"Produção para sobrevivência."},
{q:"Relação com natureza?",o:["Equilíbrio","Exploração","Destruição"],a:0,exp:"Uso sustentável."},
{q:"Quilombos surgiram como?",o:["Refúgio","Cidade moderna","Indústria"],a:0,exp:"Fuga da escravidão."},
{q:"Tradição oral preserva?",o:["Cultura","Indústria","Tecnologia"],a:0,exp:"Mantém cultura viva."},

// 👉 continue até 100 manualmente (sem repetir)
];

// ===== lógica =====
let quiz=[],i=0,score=0;

function start(n){
document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";
quiz=[...banco].sort(()=>Math.random()-0.5).slice(0,n);
render();
}

function render(){
let q=quiz[i];
document.getElementById("p").innerText=`${i+1}/${quiz.length}`;
document.getElementById("q").innerText=q.q;

let box=document.getElementById("o");
box.innerHTML="";

let ops=[...q.o].sort(()=>Math.random()-0.5);

ops.forEach(opt=>{
let b=document.createElement("button");
b.innerText=opt;

b.onclick=()=>{
if(opt===q.o[q.a]){b.classList.add("correct");score++;}
else{b.classList.add("wrong");}

document.getElementById("exp").innerText=q.exp;

setTimeout(()=>{
i++;
if(i<quiz.length) render();
else finish();
},800);
};

box.appendChild(b);
});
}

function finish(){
document.getElementById("game").style.display="none";
document.getElementById("end").style.display="block";
document.getElementById("res").innerText="Acertos: "+score;
}

</script>

</body>
</html>
