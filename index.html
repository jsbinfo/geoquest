<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest 100 - National Geographic Edition</title>
    <style>
        :root { --blue: #1e40af; --sand: #fefce8; --text: #1e293b; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow: hidden; color: var(--text);
        }

        /* --- BACKGROUND COM GLOBO REAL --- */
        .globe-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 800px; height: 800px; opacity: 0.6; z-index: -1;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/2/22/Earth_Western_Hemisphere_transparent_background.png');
            background-size: contain; background-repeat: no-repeat;
            animation: spin 60s linear infinite;
        }
        @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        .atlas-card { 
            background: var(--sand); border-radius: 15px; padding: 40px; 
            width: 90%; max-width: 480px; box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 5px solid #d4d4d8; position: relative;
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
        }

        .header { border-bottom: 3px double var(--blue); margin-bottom: 25px; text-align: center; }
        h1 { margin: 0; font-size: 26px; color: var(--blue); letter-spacing: 2px; }

        /* Botões 20, 30, 50 */
        .btn-geo { 
            background: var(--blue); color: white; border: none; padding: 18px; 
            border-radius: 8px; width: 100%; font-size: 16px; font-weight: bold; 
            cursor: pointer; margin-bottom: 12px; transition: 0.2s; border-bottom: 4px solid #172554;
        }
        .btn-geo:hover { background: #0ea5e9; transform: translateY(-3px); }

        .opt-geo { 
            background: white; border: 2px solid #cbd5e1; border-radius: 8px; 
            padding: 15px; margin-bottom: 10px; width: 100%; text-align: left; 
            cursor: pointer; font-weight: 600; font-size: 16px; transition: 0.2s;
        }
        .opt-geo:hover { background: #e0f2fe; padding-left: 25px; }

        #unlock-screen { position: absolute; z-index: 100; width: 100%; height: 100%; background: var(--sand); display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 10px; top: 0; left: 0; }
        #start, #game, #result { display: none; }
        .anim-acerto { background: #bcfab0 !important; }
        .anim-erro { animation: shake 0.4s; background: #fecaca !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

    <div class="globe-bg"></div>

    <div class="atlas-card">
        <div id="unlock-screen">
            <h1 style="margin-bottom: 20px;">🌎 GeoQuest 100</h1>
            <button class="btn-geo" onclick="desbloquear()">INICIAR EXPEDIÇÃO</button>
            <p style="font-size: 12px;">(Clique para ativar o áudio do mapa)</p>
        </div>

        <div id="start">
            <div class="header">
                <h1>EXPEDIÇÃO</h1>
            </div>
            <button class="btn-geo" onmouseenter="playFlick()" onclick="jogar(20)">📍 20 QUESTÕES</button>
            <button class="btn-geo" onmouseenter="playFlick()" onclick="jogar(30)">🚢 30 QUESTÕES</button>
            <button class="btn-geo" onmouseenter="playFlick()" onclick="jogar(50)">🔭 50 QUESTÕES</button>
        </div>

        <div id="game">
            <div id="progress" style="font-size: 12px; font-weight: bold; color: var(--blue); margin-bottom: 10px;"></div>
            <div id="q-txt" style="font-size: 19px; font-weight: 800; margin-bottom: 25px;"></div>
            <div id="opts"></div>
        </div>

        <div id="result">
            <h1 id="res-rank">CONCLUÍDO</h1>
            <p id="res-score" style="font-size: 20px; font-weight: bold; margin: 20px 0;"></p>
            <button class="btn-geo" onclick="location.reload()">REINICIAR</button>
        </div>
    </div>

<script>
    let audioCtx;
    
    function desbloquear() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('unlock-screen').style.display = 'none';
        document.getElementById('start').style.display = 'block';
    }

    function playFlick() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        const src = audioCtx.createBufferSource();
        src.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'highpass'; filter.frequency.setValueAtTime(3000, now);
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.06, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
        src.connect(filter); filter.connect(g); g.connect(audioCtx.destination);
        src.start();
    }

    function playPalmas() {
        for(let i=0; i<8; i++) {
            setTimeout(() => {
                const src = audioCtx.createBufferSource();
                const b = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
                const d = b.getChannelData(0);
                for (let j = 0; j < d.length; j++) d[j] = Math.random() * 2 - 1;
                src.buffer = b;
                const g = audioCtx.createGain();
                g.gain.setValueAtTime(0.08, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                src.connect(g); g.connect(audioCtx.destination);
                src.start();
            }, i * 40);
        }
    }

    function playAhhh() {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(220, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.5);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.6);
    }

    const bancoBase = [
        { q: "O que é um 'Território Ancestral'?", o: ["Terra para lucro", "Espaço de herança cultural e histórica", "Loteamento novo"], a: 1 },
        { q: "Casas ribeirinhas são palafitas para?", o: ["Estilo", "Proteção contra cheias dos rios", "Gastar menos"], a: 1 },
        { q: "A Aldeia Ipavu situa-se no:", o: ["Xingu", "Litoral", "Sertão"], a: 0 },
        { q: "Quilombo simboliza o quê?", o: ["Mercado", "Resistência e liberdade", "Fábrica"], a: 1 },
        { q: "Principal transporte ribeirinho?", o: ["Trem", "Canoa ou Voadeira", "Moto"], a: 1 }
    ];

    let quiz = [], cur = 0, score = 0, busy = false;

    function jogar(n) {
        document.getElementById('start').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        let b100 = [];
        while(b100.length < 100) { bancoBase.forEach(i => { if(b100.length < 100) b100.push({...i}); }); }
        quiz = b100.sort(() => Math.random() - 0.5).slice(0, n);
        render();
    }

    function render() {
        busy = false;
        const q = quiz[cur];
        document.getElementById('progress').innerText = `ETAPA ${cur+1} DE ${quiz.length}`;
        document.getElementById('q-txt').innerText = q.q;
        const box = document.getElementById('opts'); box.innerHTML = '';
        q.o.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'opt-geo'; b.innerText = txt;
            b.onmouseenter = () => playFlick();
            b.onclick = () => {
                if(busy) return; busy = true;
                if(i === q.a) { playPalmas(); b.classList.add('anim-acerto'); score++; }
                else { playAhhh(); b.classList.add('anim-erro'); }
                setTimeout(() => { cur++; if(cur < quiz.length) render(); else finalizar(); }, 800);
            };
            box.appendChild(b);
        });
    }

    function finalizar() {
        document.getElementById('game').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('res-score').innerText = `Acertos: ${score} de ${quiz.length}`;
    }
</script>
</body>
</html>
