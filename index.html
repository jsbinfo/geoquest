<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest 100 - Esthela</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #4f46e5; --secondary: #0ea5e9; --success: #22c55e; --bg: #f0f9ff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        
        /* Card com efeito 3D e flutuação */
        .card { background: white; border-radius: 30px; padding: 40px; width: 100%; max-width: 500px; box-shadow: 0 20px 40px rgba(14,165,233,0.15); text-align: center; border: 4px solid white; transition: 0.3s; }
        
        h1 { color: #1e293b; font-size: 28px; margin-bottom: 10px; }
        
        /* Botões Estilo Jogo (Gamificados) */
        .btn-main { background: var(--secondary); color: white; border: none; padding: 20px; border-radius: 20px; width: 100%; font-size: 18px; font-weight: 800; cursor: pointer; box-shadow: 0 6px 0 #0284c7; margin-bottom: 15px; transition: 0.1s; }
        .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 #0284c7; }
        
        .btn-opt { background: white; border: 2px solid #e2e8f0; border-radius: 18px; padding: 18px; margin-bottom: 12px; width: 100%; text-align: left; cursor: pointer; font-weight: 600; font-size: 17px; color: #475569; box-shadow: 0 4px 0 #e2e8f0; transition: 0.2s; }
        .btn-opt:hover { border-color: var(--secondary); background: #f0f9ff; }
        
        /* Cores de Feedback */
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; box-shadow: 0 4px 0 #16a34a !important; color: #166534 !important; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; box-shadow: 0 4px 0 #dc2626 !important; color: #991b1b !important; }
        
        /* Barra de Progresso Animada */
        .progress-box { width: 100%; background: #e2e8f0; height: 14px; border-radius: 20px; margin-bottom: 30px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--secondary), var(--success)); width: 0%; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #game, #result { display: none; }
        .q-tag { color: var(--secondary); font-weight: 800; font-size: 14px; text-transform: uppercase; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="card" id="start">
    <div style="font-size: 80px; margin-bottom: 10px;">🎮</div>
    <h1>GeoQuest 100</h1>
    <p style="color: #64748b; margin-bottom: 30px;">Missão Especial para a Esthela!</p>
    <button class="btn-main" onclick="iniciar(20)">🚀 NÍVEL 1 (20 Qs)</button>
    <button class="btn-main" onclick="iniciar(50)" style="background:var(--primary); box-shadow: 0 6px 0 #3730a3;">🚁 NÍVEL 2 (50 Qs)</button>
    <button class="btn-main" onclick="iniciar(100)" style="background:#8b5cf6; box-shadow: 0 6px 0 #6d28d9;">👑 DESAFIO 100</button>
</div>

<div class="card" id="game">
    <div class="progress-box"><div id="pb" class="progress-fill"></div></div>
    <span class="q-tag" id="q-count"></span>
    <div id="q-txt" style="font-size: 20px; font-weight: 700; margin-bottom: 25px; text-align: left; line-height: 1.4;"></div>
    <div id="opts"></div>
</div>

<div class="card" id="result">
    <div style="font-size: 80px;">🏆</div>
    <h1 id="res-msg"></h1>
    <p id="res-score" style="font-size: 20px; color: #64748b; margin-bottom: 30px;"></p>
    <button class="btn-main" onclick="location.reload()">JOGAR NOVAMENTE</button>
</div>

<script>
    // A URL que você gerou no Apps Script
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwCtokjD5Uw6weMAjlp2iQhsXpfi9lpCTvvAp8yTRan35-SskKIrxGfh1So617-8FEq/exec";

    function logAcesso() {
        // Método Beacon: Mais silencioso e evita erros de "Content-Type" no console
        try {
            navigator.sendBeacon(URL_SCRIPT + "?ip=Acesso_Esthela_" + new Date().toLocaleTimeString());
        } catch(e) {}
    }

    const base = [
        { q: "Por que as casas ribeirinhas são palafitas?", o: ["Pela vista do rio", "Para evitar enchentes", "Para os peixes entrarem"], a: 1 },
        { q: "Onde fica a aldeia Ipavu?", o: ["No Rio de Janeiro", "No Parque do Xingu (MT)", "Em São Paulo"], a: 1 },
        { q: "Material usado nas ocas tradicionais?", o: ["Tijolo e telha", "Barro, palha e madeira", "Plástico reciclado"], a: 1 },
        { q: "O que é um Quilombo?", o: ["Um tipo de dança", "Comunidade de resistência", "Um shopping antigo"], a: 1 },
        { q: "Transporte comum dos ribeirinhos?", o: ["Metrô", "Barcos e canoas", "Helicóptero"], a: 1 },
        { q: "As mulheres de Malhadinha plantam o quê?", o: ["Só flores", "Alimentos para a comunidade", "Apenas eucalipto"], a: 1 },
        { q: "Como os saberes são passados nos quilombos?", o: ["Pelo YouTube", "Através das histórias dos mais velhos", "Por e-mail"], a: 1 },
        { q: "Cuidar da natureza para esses povos é...", o: ["Um passatempo", "Modo de vida e sobrevivência", "Algo proibido"], a: 1 },
        { q: "O que é a tradição oral?", o: ["Cuidar dos dentes", "Passar cultura pela fala", "Aprender a cantar"], a: 1 },
        { q: "A escola na floresta ensina sobre...", o: ["Só prédios", "A fauna e a flora local", "Como morar em Marte"], a: 1 }
    ];

    let bank = [], cur = 0, score = 0, bloqueado = false;

    function iniciar(n) {
        logAcesso();
        document.getElementById('start').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        
        // Lógica para gerar as 100 questões embaralhadas
        let temp = [];
        while(temp.length < 100) { base.forEach(x => temp.push({...x})); }
        bank = temp.sort(() => Math.random() - 0.5).slice(0, n);
        render();
    }

    function render() {
        bloqueado = false;
        const q = bank[cur];
        document.getElementById('pb').style.width = (cur/bank.length*100)+'%';
        document.getElementById('q-count').innerText = `DESAFIO: QUESTÃO ${cur+1} DE ${bank.length}`;
        document.getElementById('q-txt').innerText = q.q;
        const container = document.getElementById('opts');
        container.innerHTML = '';
        
        q.o.forEach((t, i) => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.innerText = t;
            b.onclick = () => {
                if(bloqueado) return;
                bloqueado = true;
                const correto = i === q.a;
                if(correto) { 
                    b.classList.add('correct'); 
                    score++; 
                    if(typeof confetti === 'function') confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                } else { 
                    b.classList.add('wrong'); 
                }
                
                setTimeout(() => {
                    cur++;
                    if(cur < bank.length) render();
                    else finalizar();
                }, 1000);
            };
            container.appendChild(b);
        });
    }

    function finalizar() {
        document.getElementById('game').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('res-msg').innerText = score > (bank.length/2) ? "VOCÊ É GENIAL!" : "MUITO BEM!";
        document.getElementById('res-score').innerText = `Esthela, você completou o desafio com ${score} acertos!`;
    }
</script>
</body>
</html>
