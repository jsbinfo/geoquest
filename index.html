<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>GeoQuest Esthela - Completo com Explicação</title>

<style>
body {font-family:Arial;background:#111;color:#000;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}
.card{background:#fefce8;padding:20px;border-radius:12px;width:90%;max-width:600px;}
button{width:100%;padding:10px;margin:5px 0;cursor:pointer;}
.correct{background:#86efac;}
.wrong{background:#fecaca;}
#exp{margin-top:15px;font-weight:bold;}
</style>
</head>

<body>
<div class="card">

<div id="start">
<h2>GeoQuest</h2>
<button onclick="start(20)">20 questões</button>
<button onclick="start(30)">30 questões</button>
<button onclick="start(50)">50 questões</button>
</div>

<div id="game" style="display:none;">
<p id="progress"></p>
<h3 id="q"></h3>
<div id="opts"></div>
<p id="exp"></p>
</div>

<div id="result" style="display:none;">
<h2>Resultado</h2>
<p id="score"></p>
<button onclick="location.reload()">Reiniciar</button>
</div>

</div>

<script>

// ===== BASE COM EXPLICAÇÃO =====
const base = [
["O que caracteriza comunidades tradicionais?","Ligação cultural ao território",
["Uso industrial","Vida urbana"],
"Essas comunidades mantêm uma forte relação histórica e cultural com o território onde vivem."],

["Para que servem as palafitas?","Evitar enchentes",
["Decoração","Turismo"],
"As palafitas são construídas sobre estacas para proteger as casas das cheias dos rios."],

["O que é tradição oral?","Transmissão pela fala",
["Internet","Livros"],
"A tradição oral preserva histórias, costumes e conhecimentos de geração em geração."],

["Quem são os quilombolas?","Descendentes de africanos escravizados",
["Europeus","Asiáticos"],
"Os quilombolas são formados por descendentes de africanos que resistiram à escravidão."],

["Onde vivem os ribeirinhos?","Próximos aos rios",
["Deserto","Montanha"],
"Eles vivem às margens dos rios e dependem deles para transporte e alimentação."]
];

// ===== GERAR 100 VARIAÇÕES =====
let banco100 = [];
for(let i=0;i<100;i++){
    let b = base[i % base.length];
    banco100.push({
        q: b[0] + " ("+(i+1)+")",
        correta: b[1],
        erradas: b[2],
        exp: b[3]
    });
}

// ===== EMBARALHAR =====
function montar(){
return banco100.map(item=>{
    let op=[item.correta,...item.erradas].sort(()=>Math.random()-0.5);
    return {
        q:item.q,
        o:op,
        a:op.indexOf(item.correta),
        exp:item.exp
    };
});
}

let quiz=[],cur=0,score=0,busy=false;

function start(n){
document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";
quiz=montar().sort(()=>Math.random()-0.5).slice(0,n);
render();
}

function render(){
busy=false;
document.getElementById("exp").innerText="";

let q=quiz[cur];
document.getElementById("progress").innerText=`${cur+1}/${quiz.length}`;
document.getElementById("q").innerText=q.q;

let box=document.getElementById("opts");
box.innerHTML="";

q.o.forEach((opt,i)=>{
let b=document.createElement("button");
b.innerText=opt;

b.onclick=()=>{
if(busy) return;
busy=true;

if(i===q.a){
b.classList.add("correct");
score++;
}else{
b.classList.add("wrong");
}

document.getElementById("exp").innerText="Explicação: "+q.exp;

setTimeout(()=>{
cur++;
if(cur<quiz.length) render();
else end();
},2000);
};

box.appendChild(b);
});
}

function end(){
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("score").innerText=`Acertos: ${score}/${quiz.length}`;
}

</script>

</body>
</html>
