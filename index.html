<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest 100 - Esthela</title>
    <style>
        :root { --primary: #4f46e5; --secondary: #0ea5e9; --success: #22c55e; --bg: #f0f9ff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        
        .card { background: white; border-radius: 30px; padding: 30px; width: 90%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; border: 4px solid white; position: relative; z-index: 10; }
        
        .btn-main { background: var(--secondary); color: white; border: none; padding: 20px; border-radius: 20px; width: 100%; font-size: 18px; font-weight: 800; cursor: pointer; box-shadow: 0 6px 0 #0284c7; margin-bottom: 15px; }
        .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 #0284c7; }
        
        .btn-opt { background: white; border: 2px solid #e2e8f0; border-radius: 15px; padding: 15px; margin-bottom: 10px; width: 100%; text-align: left; cursor: pointer; font-weight: 600; box-shadow: 0 4px 0 #e2e8f0; transition: 0.2s; }
        .btn-opt:hover { background: #f0f9ff; border-color: var(--secondary); }
        
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; box-shadow: 0 4px 0 #16a34a !important; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; box-shadow: 0 4px 0 #dc2626 !important; }
        
        .progress-bar { width: 100%; background: #eee; height: 12px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.4s; }

        #game, #result { display: none; }

        /* Confete Simples em CSS */
        .confetti { position: absolute; width: 10px; height: 10px; background: #f00; z-index: 1; animation: fall 3s linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

<div class="card" id="start">
    <div style="font-size: 60px;">🌍</div>
    <h1>GeoQuest 100</h1>
    <button class="btn-main" onclick="iniciar(20)">🚀 NÍVEL 1 (20 Qs)</button>
    <button class="btn-main" onclick="iniciar(100)" style="background:#8b5cf6; box-shadow:0 6px 0 #6d28d9;">👑 DESAFIO 100</button>
</div>

<div class="card" id="game">
    <div class="progress-bar"><div id="pb" class="progress-fill"></div></div>
    <div id="q-txt" style="font-size: 18px; font-weight: bold; margin-bottom: 20px; text-align: left;"></div>
    <div id="opts"></div>
</div>

<div class="card" id="result">
    <h1>🏆 FIM!</h1>
    <p id="res-score" style="font-size: 20px;"></p>
    <button class="btn-main" onclick="location.reload()">RECOMEÇAR</button>
</div>

<script>
    // URL do seu Script
    const URL_LOG = "https://script.google.com/macros/s/AKfycbwCtokjD5Uw6weMAjlp2iQhsXpfi9lpCTvvAp8yTRan35-SskKIrxGfh1So617-8FEq/exec";

    function simpleConfetti() {
        for(let i=0; i<30; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.backgroundColor = ['#ff0','#f0f','#0ff','#0f0'][Math.floor(Math.random()*4)];
            c.style.top = '-10px';
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 3000);
        }
    }

    const base = [
        { q: "Por que palafitas são altas?", o: ["Estilo", "Evitar enchentes", "Fugir do calor"], a: 1 },
        { q: "Onde fica a aldeia Ipavu?", o: ["No Rio", "No Xingu (MT)", "Amazonas"], a: 1 },
        { q: "Material das ocas?", o: ["Pedra", "Barro e Palha", "Metal"], a: 1 },
        { q: "O que é Quilombo?", o: ["Mercado", "Resistência", "Fábrica"], a: 1 },
        { q: "Transporte ribeirinho?", o: ["Carro", "Barco", "Trem"], a: 1 }
    ];

    let bank = [], cur = 0, score = 0, busy = false;

    function iniciar(n) {
        // Envio de log via Image (o jeito mais resistente a bloqueios)
        const img = new Image();
        img.src = URL_LOG + "?ip=Esthela_Log&t=" + new Date().getTime();

        document.getElementById('start').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        
        let temp = [];
        while(temp.length < 100) { base.forEach(x => temp.push({...x})); }
        bank = temp.sort(() => Math.random() - 0.5).slice(0, n);
        render();
    }

    function render() {
        busy = false;
        const q = bank[cur];
        document.getElementById('pb').style.width = (cur/bank.length*100)+'%';
        document.getElementById('q-txt').innerText = `Questão ${cur+1}: ${q.q}`;
        const container = document.getElementById('opts');
        container.innerHTML = '';
        
        q.o.forEach((t, i) => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.innerText = t;
            b.onclick = () => {
                if(busy) return;
                busy = true;
                if(i === q.a) { 
                    b.classList.add('correct'); 
                    score++; 
                    simpleConfetti();
                } else { 
                    b.classList.add('wrong'); 
                }
                setTimeout(() => {
                    cur++;
                    if(cur < bank.length) render();
                    else finalizar();
                }, 800);
            };
            container.appendChild(b);
        });
    }

    function finalizar() {
        document.getElementById('game').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('res-score').innerText = `Esthela, você acertou ${score} de ${bank.length}!`;
    }
</script>
</body>
</html>
