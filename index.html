<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>GeoQuest 100</title>
    <style>
        body { font-family: sans-serif; background: #f0f9ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; border-radius: 20px; padding: 30px; width: 400px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn { background: #0ea5e9; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
        .btn-opt { background: #f8fafc; border: 1px solid #ddd; color: #333; margin-top: 5px; }
        .progress { background: #eee; height: 10px; border-radius: 5px; margin-bottom: 20px; }
        .fill { height: 100%; background: #22c55e; width: 0%; border-radius: 5px; transition: 0.3s; }
        #game, #result { display: none; }
    </style>
</head>
<body>

    <div class="card" id="start">
        <h1>🌍 GeoQuest 100</h1>
        <button class="btn" onclick="iniciar(20)">Nível 1 (20 Qs)</button>
        <button class="btn" onclick="iniciar(100)">Nível Rei (100 Qs)</button>
    </div>

    <div class="card" id="game">
        <div class="progress"><div id="pb" class="fill"></div></div>
        <p id="q-txt"></p>
        <div id="opts"></div>
    </div>

    <div class="card" id="result">
        <h2>Fim de Jogo!</h2>
        <p id="res-score"></p>
        <button class="btn" onclick="location.reload()">Recomeçar</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
