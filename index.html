<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest 100 - Edição Especial</title>
    <style>
        :root { 
            --geo-blue: #1e40af; --geo-green: #15803d; --geo-sand: #fefce8; 
            --ocean: #0ea5e9; --text: #1e293b;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #0c4a6e, #082f49);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow: hidden;
            color: var(--text);
        }

        .atlas-card { 
            background: var(--geo-sand); 
            border-radius: 15px; padding: 40px; width: 90%; max-width: 500px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 4px solid #d4d4d8; position: relative;
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
        }

        .header { border-bottom: 3px double var(--geo-blue); margin-bottom: 25px; padding-bottom: 10px; }
        h1 { margin: 0; font-size: 28px; color: var(--geo-blue); text-transform: uppercase; letter-spacing: 2px; }

        .btn-geo { 
            background: var(--geo-blue); color: white; border: none; padding: 18px; border-radius: 8px; width: 100%; 
            font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 12px; transition: 0.2s;
            border-bottom: 4px solid #172554; display: block;
        }
        .btn-geo:hover { background: var(--ocean); transform: scale(1.02); }

        .opt-geo { 
            background: white; border: 2px solid #cbd5e1; border-radius: 8px; padding: 15px; 
            margin-bottom: 10px; width: 100%; text-align: left; cursor: pointer; 
            font-weight: 600; font-size: 16px; transition: 0.2s;
        }
        .opt-geo:hover { background: #e0f2fe; border-color: var(--ocean); padding-left: 25px; }

        .anim-acerto { background: #bcfab0 !important; border-color: var(--geo-green) !important; color: #064e3b; }
        .anim-erro { animation: shake 0.4s; background: #fecaca !important; border-color: #991b1b !important; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        #game, #result { display: none; }
    </style>
</head>
<body onclick="initAudio()">

<div class="atlas-card">
    <div id="start">
        <div class="header">
            <h1>🌎 GeoQuest 100</h1>
            <p style="font-style: italic; margin-top: 5px;">Exploração Geográfica Brasileira</p>
        </div>
        <p style="font-weight: 600;">Selecione o tamanho da expedição:</p>
        <button class="btn-geo" onmouseenter="playSound('flick')" onclick="jogar(20)">📍 20 QUESTÕES</button>
        <button class="btn-geo" onmouseenter="playSound('flick')" onclick="jogar(30)">🚢 30 QUESTÕES</button>
        <button class="btn-geo" onmouseenter="playSound('flick')" onclick="jogar(50)">🔭 50 QUESTÕES</button>
    </div>

    <div id="game">
        <div id="progress" style="font-size: 12px; font-weight: bold; color: var(--geo-blue); margin-bottom: 10px;"></div>
        <div id="q-txt" style="font-size: 19px; font-weight: 800; margin-bottom: 25px; line-height: 1.3;"></div>
        <div id="opts"></div>
    </div>

    <div id="result">
        <h1 id="res-rank">CONCLUÍDO</h1>
        <p id="res-score" style="font-size: 20px; font-weight: bold; margin: 20px 0;"></p>
        <button class="btn-geo" onmouseenter="playSound('flick')" onclick="location.reload()">REINICIAR</button>
    </div>
</div>

<script>
    let audioCtx;
    
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;

        if (type === 'flick') {
            const bufferSize = audioCtx.sampleRate * 0.05;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass'; filter.frequency.setValueAtTime(3000, now);
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.05, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
            noise.connect(filter); filter.connect(g); g.connect(audioCtx.destination);
            noise.start();
        } 
        else if (type === 'acerto') {
            // Simulação de PALMAS (Ruído branco pulsado)
            for(let i=0; i<8; i++) {
                setTimeout(() => {
                    const noise = audioCtx.createBufferSource();
                    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
                    const d = buf.getChannelData(0);
                    for (let j = 0; j < d.length; j++) d[j] = Math.random() * 2 - 1;
                    noise.buffer = buf;
                    const f = audioCtx.createBiquadFilter();
                    f.type = 'bandpass'; f.frequency.setValueAtTime(1200 + (Math.random()*400), audioCtx.currentTime);
                    const g = audioCtx.createGain();
                    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                    noise.connect(f); f.connect(g); g.connect(audioCtx.destination);
                    noise.start();
                }, i * 40);
            }
        }
        else if (type === 'erro') {
            // Som de "AHHH" (Onda dente de serra modulada)
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(220, now); 
            osc.frequency.exponentialRampToValueAtTime(110, now + 0.5); // Cai o tom (tristeza)
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(800, now);

            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.6);
            
            osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 0.6);
        }
    }

    const bancoBase = [
        { q: "O que caracteriza o conceito de 'Território Ancestral'?", o: ["Áreas destinadas à urbanização", "Espaço de herança cultural e histórica de um povo", "Terras para exploração mineral"], a: 1 },
        { q: "Por que as comunidades ribeirinhas constroem palafitas?", o: ["Estilo visual", "Adaptação às cheias sazonais dos rios", "Proteção contra o calor"], a: 1 },
        { q: "A Aldeia Ipavu (Xingu) é do povo?", o: ["Kamayurá", "Guarani", "Yanomami"], a: 0 },
        { q: "Quilombo simboliza o quê?", o: ["Comércio antigo", "Resistência e liberdade negra", "Fazenda real"], a: 1 },
        { q: "Transporte comum entre ribeirinhos?", o: ["Trem", "Canoa ou Voadeira", "Ônibus"], a: 1 }
    ];

    let quiz = [], cur = 0, score = 0, busy = false;

    function jogar(n) {
        initAudio();
        document.getElementById('start').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        let b100 = [];
        while(b100.length < 100) { bancoBase.forEach(i => { if(b100.length < 100) b100.push({...i}); }); }
        quiz = b100.sort(() => Math.random() - 0.5).slice(0, n);
        render();
    }

    function render() {
        busy = false;
        const q = quiz[cur];
        document.getElementById('progress').innerText = `QUESTÃO ${cur+1} DE ${quiz.length}`;
        document.getElementById('q-txt').innerText = q.q;
        const box = document.getElementById('opts');
        box.innerHTML = '';

        q.o.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'opt-geo';
            b.innerText = txt;
            b.onmouseenter = () => playSound('flick');
            b.onclick = () => {
                if(busy) return;
                busy = true;
                if(i === q.a) {
                    playSound('acerto');
                    b.classList.add('anim-acerto');
                    score++;
                } else {
                    playSound('erro');
                    b.classList.add('anim-erro');
                }
                setTimeout(() => {
                    cur++;
                    if(cur < quiz.length) render();
                    else finalizar();
                }, 800);
            };
            box.appendChild(b);
        });
    }

    function finalizar() {
        document.getElementById('game').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('res-score').innerText = `Expedição Finalizada: ${score} de ${quiz.length}`;
    }
</script>
</body>
</html>
